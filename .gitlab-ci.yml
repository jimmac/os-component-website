stages:
  - build
  - deploy

build-zola:
  stage: build
  image: archlinux:latest
  script:
    - pacman -Syu --noconfirm zola
    - zola build --output-dir public
  artifacts:
    paths:
      - public
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH

pages:
  stage: deploy
  image: archlinux:latest
  needs:
    - build-zola
  script:
    - echo "Deploying to GitLab Pages..."
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
